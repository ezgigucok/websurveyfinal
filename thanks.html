<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teşekkürler — Güçok</title>
<link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Rethink Sans', sans-serif; background: #f5f5f2; color: #2e304c; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: #ffffff; border-radius: 16px; border: 1px solid #e2e2dc; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; }
.icon { font-size: 52px; margin-bottom: 1.5rem; }
h1 { font-size: 24px; font-weight: 700; color: #2e304c; margin-bottom: 12px; line-height: 1.3; }
p { font-size: 15px; color: #6b7280; line-height: 1.7; margin-bottom: 2rem; }
.btn { display: inline-block; padding: 13px 32px; background: #2e304c; color: #ffffff; border-radius: 8px; font-family: 'Rethink Sans', sans-serif; font-size: 15px; font-weight: 600; text-decoration: none; }
.btn:hover { background: #38437A; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Görüşme talebinizi aldık</h1>
  <p>Görüşme planlaması için e-posta adresiniz üzerinden en kısa sürede iletişime geçeceğiz ✉️</p>
  <a href="https://www.gucok.com" class="btn">Güçok Nedir? →</a>
</div>
</body>
</html>
